name: squad-conteudo
version: 2.0.0
short-title: Squad de Conteúdo SEO
description: >
  Squad especializado em produção de conteúdo SEO para MEIs, empreendedores e microempreendedores
  brasileiros. Segue o guia de estilo com heurísticas rígidas de redação e estrutura orientada
  por intenção de busca real. Pipeline completo: pesquisa → redação → auditoria → publicação.
author: servicosgabriella
license: UNLICENSED
slashPrefix: conteudo

aiox:
  minVersion: "2.1.0"
  type: squad

components:
  agents:
    - copywriter-seo.md
    - pesquisador-seo.md
    - qa-conteudo.md
    - head-de-conteudo.md
  tasks:
    - orquestrar-pauta.md        # Orquestrador — dispara todo o pipeline (suporta --via-gemini)
    - pesquisar-pauta.md         # Pesquisa de H2s no Google (modo padrão)
    - redigir-artigo.md          # Redação do artigo (modo padrão)
    - gemini-pesquisar.md        # Pesquisa via Gemini API (modo --via-gemini)
    - gemini-redigir.md          # Redação via Gemini + revisão Claude (modo --via-gemini)
    - auditar-artigo.md          # Auditoria de qualidade (QA)
    - gerar-capa.md              # Geração de imagem de capa
    - montar-arquivo.md          # Criação do arquivo com frontmatter correto
    - git-publicar.md            # Commit + delegação de push para @devops
    - atualizar-pos-publicacao.md # Atualiza autor e estrutura (review e content layouts)
  workflows:
    - pipeline-conteudo.md       # Referência visual do pipeline (não executável diretamente)
  checklists:
    - checklist-pre-publicacao.md  # 14 pontos — executado pelo @qa-conteudo
    - checklist-research.md        # Entrega do @pesquisador-seo
  templates:
    - artigo-template.md           # Template base do artigo
    - briefing-tmpl.md             # Handoff: @head-de-conteudo → @copywriter-seo
    - feedback-qa-tmpl.md          # Templates de veto e aprovação do @qa-conteudo
  scripts: []
  tools:
    - gemini-client.js     # Cliente base Gemini API (retry + fallback)
    - gemini-pesquisar.js  # Pesquisa de H2s via Gemini (substitui @pesquisador-seo)
    - gemini-redigir.js    # Redação de artigo via Gemini (substitui @copywriter-seo)

config:
  extends: extend
  style-guide: config/style-guide.md       # Single source of truth para estilo editorial
  blacklist: config/blacklist.md           # Single source of truth para linguagem proibida
  slug-rules: config/slug-rules.md         # Single source of truth para regras de URL
  tech-stack: config/tech-stack.md
  source-tree: config/source-tree.md
  gemini: config/gemini-config.yaml        # Configuração da integração Gemini API

dependencies:
  node: []
  python: []
  squads: []

tags:
  - seo
  - content
  - copywriting
  - brasil
  - empreendedorismo
